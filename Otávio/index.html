<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Conversor de câmbio em tempo real entre Dólar Americano (USD) e Real Brasileiro (BRL). Cotações atualizadas via AwesomeAPI.">
  <meta name="theme-color" content="#3D6B3F">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='0.9em' font-size='90'>💵</text></svg>">
  <title>Câmbio USD / BRL | AGES PUCRS</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header__inner">
      <h1 class="header__logo">Câmbio<span class="header__dot">.</span></h1>
      <p class="header__tagline">Conversor em tempo real</p>
    </div>
  </header>

  <!-- MAIN -->
  <main>
    <div class="main__layout">

      <!-- Coluna esquerda -->
      <div class="coluna coluna--esquerda">
        <section class="card-cotacao">
          <div class="card-cotacao__badge">USD/BRL</div>
          <p class="card-cotacao__titulo">Cotação Atual</p>
          <p class="card-cotacao__valor" id="cotacao-valor">
            <span class="card-cotacao__placeholder">carregando</span>
          </p>
          <div class="card-cotacao__detalhes" id="cotacao-detalhes">
            <button class="card-cotacao__detalhe" data-tipo="turismo" data-par="USD-BRLT">
              <span class="card-cotacao__detalhe-label">Turismo</span>
              <span class="card-cotacao__detalhe-valor" id="detalhe-turismo">--</span>
            </button>
            <button class="card-cotacao__detalhe" data-tipo="venda" data-par="USD-BRL" data-campo="ask">
              <span class="card-cotacao__detalhe-label">Venda</span>
              <span class="card-cotacao__detalhe-valor" id="detalhe-ask">--</span>
            </button>
            <button class="card-cotacao__detalhe" data-tipo="variacao">
              <span class="card-cotacao__detalhe-label">Variação</span>
              <span class="card-cotacao__detalhe-valor" id="detalhe-var">--</span>
            </button>
          </div>
          <p class="card-cotacao__atualizado" id="cotacao-hora"></p>
        </section>

        <section class="card-grafico" id="card-grafico">
          <div class="card-grafico__header">
            <h3 class="card-grafico__titulo" id="grafico-titulo">Turismo - 30 dias</h3>
          </div>
          <div class="card-grafico__body">
            <canvas id="grafico-canvas"></canvas>
            <p class="card-grafico__loading" id="grafico-loading">Carregando dados...</p>
          </div>
        </section>
      </div>

      <!-- Coluna direita -->
      <div class="coluna coluna--direita">
        <section class="card-conversor">
          <h2 class="card-conversor__titulo">Converter</h2>

          <div class="campo">
            <label class="campo__label" for="moeda-de">De</label>
            <div class="campo__select-wrapper">
              <select class="campo__select" id="moeda-de">
                <option value="BRL" selected>BRL - Real Brasileiro</option>
                <option value="USD">USD - Dólar Americano</option>
              </select>
            </div>
          </div>

          <button type="button" class="swap-btn" id="btn-swap" aria-label="Inverter moedas" title="Inverter moedas">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7 16V4m0 0L3 8m4-4l4 4"/>
              <path d="M17 8v12m0 0l4-4m-4 4l-4-4"/>
            </svg>
          </button>

          <div class="campo">
            <label class="campo__label" for="moeda-para">Para</label>
            <div class="campo__select-wrapper">
              <select class="campo__select" id="moeda-para">
                <option value="USD" selected>USD - Dólar Americano</option>
                <option value="BRL">BRL - Real Brasileiro</option>
              </select>
            </div>
          </div>

          <div class="campo campo--valor">
            <label class="campo__label" for="valor-input">Valor</label>
            <div class="campo__input-wrapper">
              <span class="campo__prefix" id="input-prefix">R$</span>
              <input
                type="number"
                id="valor-input"
                class="campo__input"
                placeholder="0,00"
                min="0"
                step="0.01"
                inputmode="decimal"
              >
            </div>
          </div>

          <button type="button" id="btn-converter" class="btn-converter">
            <span class="btn-converter__text">Converter</span>
            <svg class="btn-converter__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14m-7-7l7 7-7 7"/>
            </svg>
          </button>

          <div class="loading" id="loading" role="status" aria-live="polite">
            <div class="loading__spinner" aria-hidden="true"></div>
            <span class="loading__texto">Consultando cotação...</span>
          </div>

          <section class="erro" id="erro" role="alert" aria-live="assertive">
            <svg class="erro__icone" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <p class="erro__mensagem" id="erro-mensagem"></p>
          </section>
        </section>

        <section class="resultado" id="resultado" aria-label="Resultado da conversão" aria-live="polite">
          <div class="resultado__card">
            <p class="resultado__label">Resultado</p>
            <p class="resultado__texto" id="resultado-texto"></p>
            <p class="resultado__cotacao" id="resultado-cotacao"></p>
          </div>
        </section>
      </div>

    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <p class="site-footer__texto">
      Projeto acadêmico — <a href="https://www.pucrs.br" target="_blank" rel="noopener noreferrer">AGES PUCRS</a> — Cotações via
      <a href="https://docs.awesomeapi.com.br" target="_blank" rel="noopener noreferrer">AwesomeAPI</a>
    </p>
  </footer>

  <script type="module" src="js/app.js"></script>
</body>
</html>
